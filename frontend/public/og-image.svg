<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0d1526"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.18" r="0.6">
      <stop stop-color="#7c3aed" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- subtle baseline grid accent -->
  <g stroke="#8ca5c8" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="158" x2="1200" y2="158"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- upward trend line -->
  <polyline points="80,470 250,420 360,440 500,330 640,360 780,250 920,280 1120,150"
            fill="none" stroke="url(#brand)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="1120" cy="150" r="10" fill="#7c3aed"/>

  <!-- logo mark -->
  <g transform="translate(80,80)">
    <rect width="84" height="84" rx="20" fill="url(#brand)"/>
    <path d="M22 56 L38 40 L48 50 L64 30" fill="none" stroke="#ffffff" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M58 30 L64 30 L64 36" fill="none" stroke="#ffffff" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="184" y="138" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="#e6edf7">Finverse</text>
  <text x="184" y="170" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="3" fill="#8ca5c8">NSE INTELLIGENCE</text>

  <text x="80" y="360" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff">AI-powered stock</text>
  <text x="80" y="448" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff">intelligence for the <tspan fill="#a78bfa">NSE</tspan></text>

  <text x="80" y="540" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="500" fill="#9fb0c8">Signals · Smart money · Valuation · Earnings · AI research</text>
</svg>
