# Finverse — production-shaped local stack: Postgres + migrations + API + worker.
# Secrets come from .env (see .env.example). The API runs worker-free; the
# single worker process owns the news engine, daily ETL and alert evaluator.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finverse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finverse}
      POSTGRES_DB: finverse
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finverse"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Standalone vector store. The API (reads) and jobs-worker (writes) share it
  # over HTTP, so there's no shared-filesystem (SQLite-over-NFS) locking. Data
  # persists under CHROMA_DATA_DIR — point it at a mounted EBS volume in prod
  # (e.g. CHROMA_DATA_DIR=/mnt/chroma). Image pinned to the client lib version.
  chroma:
    image: chromadb/chroma:1.5.9
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - ${CHROMA_DATA_DIR:-./chroma_data}:/chroma/chroma
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/heartbeat')"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: apply migrations, then exit. API + worker wait for this.
  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://finverse:${POSTGRES_PASSWORD:-finverse}@db:5432/finverse
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://finverse:${POSTGRES_PASSWORD:-finverse}@db:5432/finverse
      # Workers live in the dedicated `worker` service, not here — so they run
      # once even if the API is scaled to multiple replicas.
      BACKEND_ENGINE_ENABLED: "false"
      BACKEND_ETL_ENABLED: "false"
      BACKEND_ALERTS_ENABLED: "false"
      BACKEND_REDIS_URL: redis://redis:6379/0   # distributed rate limiting
      CHROMA_HOST: chroma   # RAG vector store served over HTTP (not local FS)
      CHROMA_PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      # Vectors live in the `chroma` service now; this mount only carries the
      # parent_store sidecar (parents.json) + ingest manifest, shared with jobs-worker.
      - ./chroma_db:/app/chroma_db
      - ./documents:/app/documents   # source filings
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy

  # Periodic worker: news engine, daily ETL, alert evaluator.
  worker:
    build: .
    command: python -m backend.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://finverse:${POSTGRES_PASSWORD:-finverse}@db:5432/finverse
      BACKEND_ENGINE_ENABLED: "true"
      BACKEND_ETL_ENABLED: "true"
      BACKEND_ALERTS_ENABLED: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully

  # On-demand job worker (Arq): enqueued ingestion / sentiment refresh / etc.
  jobs-worker:
    build: .
    command: arq backend.arq_worker.WorkerSettings
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://finverse:${POSTGRES_PASSWORD:-finverse}@db:5432/finverse
      BACKEND_REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma   # ingestion writes vectors to the shared Chroma server
      CHROMA_PORT: "8000"
    volumes:
      # parent_store sidecar + source filings (vectors go to the `chroma` service).
      - ./chroma_db:/app/chroma_db
      - ./documents:/app/documents
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy

volumes:
  pgdata:
