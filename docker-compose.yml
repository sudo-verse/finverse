# Finverse — production-shaped local stack: Postgres + migrations + API + worker.
# Secrets come from .env (see .env.example). The API runs worker-free; the
# single worker process owns the news engine, daily ETL and alert evaluator.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finverse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finverse}
      POSTGRES_DB: finverse
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finverse"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: apply migrations, then exit. API + worker wait for this.
  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://finverse:${POSTGRES_PASSWORD:-finverse}@db:5432/finverse
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://finverse:${POSTGRES_PASSWORD:-finverse}@db:5432/finverse
      # Workers live in the dedicated `worker` service, not here — so they run
      # once even if the API is scaled to multiple replicas.
      BACKEND_ENGINE_ENABLED: "false"
      BACKEND_ETL_ENABLED: "false"
      BACKEND_ALERTS_ENABLED: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db   # vector store (RAG)
      - ./documents:/app/documents   # source filings
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    command: python -m backend.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://finverse:${POSTGRES_PASSWORD:-finverse}@db:5432/finverse
      BACKEND_ENGINE_ENABLED: "true"
      BACKEND_ETL_ENABLED: "true"
      BACKEND_ALERTS_ENABLED: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
