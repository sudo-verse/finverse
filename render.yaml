services:
  - type: web
    name: finverse-backend
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: BACKEND_ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: BACKEND_JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: BACKEND_APP_BASE_URL
        sync: false
      - key: BACKEND_ENGINE_ENABLED
        value: "true"
      - key: BACKEND_ETL_ENABLED
        value: "true"
      - key: BACKEND_ALERTS_ENABLED
        value: "true"
